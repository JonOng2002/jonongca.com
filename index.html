            forest: {

            },
            card: {
              cream: '#FDFCF9',
              mint: '#F2F8F4',
              white: '#FFFFFF',
            },
            accent: {
              400: '#10B981',
              500: '#0FA36B',
              600: '#059669',
            },
          },
          fontFamily: {
            display: ['Manrope', 'system-ui', 'sans-serif'],
            sans: ['Manrope', 'system-ui', 'sans-serif'],
            serif: ['"Instrument Serif"', 'Georgia', 'serif'],
            mono: ['"SF Mono"', '"Monaco"', '"Menlo"', '"Courier New"', 'monospace'],
          },
          animation: {
            'scroll': 'scroll 20s linear infinite',
            'scroll-vertical': 'scroll-vertical 25s linear infinite',

            'float-delayed': 'float-delayed 22s ease-in-out infinite',
          },
          keyframes: {
            scroll: {
              '0%': { transform: 'translateX(0)' },
              '100%': { transform: 'translateX(-50%)' },
            },
            'scroll-vertical': {

            },
            'float-delayed': {
              '0%, 100%': { transform: 'translate(0, 0)' },

  <style>
    :root {
      --bg: #F7F5EF;
      --card-cream: #FDFCF9;
      --card-mint: #F2F8F4;
      --text: #0E2418;
      --muted: #5A6B61;
      --accent: #0FA36B;
      --accent-soft: rgba(15, 163, 107, 0.08);
      --border: rgba(14, 36, 24, 0.06);
      --border-hover: rgba(14, 36, 24, 0.12);
      --shadow: 0 2px 12px rgba(14, 36, 24, 0.03);
      --shadow-hover: 0 4px 24px rgba(14, 36, 24, 0.05);
      /* Border radius tokens */
      --radius-card: 20px;
      --radius-button: 12px;
      --radius-pill: 9999px;
      /* Type scale tokens (rationalized: 12/14/16/20/24/32/40px) */
      --font-size-xs: 12px;
      --font-size-sm: 14px;
      --font-size-base: 16px;
      --font-size-lg: 20px;
      --font-size-xl: 24px;
      --font-size-2xl: 32px;
      --font-size-3xl: 40px;
    }

    body {
      background: var(--bg);
      background-image: radial-gradient(circle, rgba(14, 36, 24, 0.025) 1px, transparent 1px);
      background-size: 24px 24px;
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    h1, h2, h3, h4, .font-display {
      font-family: 'Manrope', system-ui, sans-serif;
    }

    .font-serif {
      font-family: 'Instrument Serif', Georgia, serif;
    }

    .glass {
      background: var(--card-cream);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      transition: box-shadow 0.3s ease, border-color 0.3s ease, transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .glass:hover {
      border-color: var(--border-hover);
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
    }

    .glass-mint {
      background: var(--card-mint);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      transition: box-shadow 0.3s ease, border-color 0.3s ease, transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .glass-mint:hover {
      border-color: rgba(15, 163, 107, 0.15);
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
    }

    .scroll-container {
      mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
      -webkit-mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(14, 36, 24, 0.12); border-radius: 10px; }

    /* Scroll reveal */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-reveal { opacity: 0; }
    .animate-reveal.visible { animation: fadeUp 0.6s ease forwards; }

    /* Focus visible */
    *:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-radius: var(--radius-button);
    }

    /* Typewriter cursor */
    .typewriter-cursor {
      animation: blink 0.75s step-end infinite;
      color: var(--accent);
      font-weight: 400;
      margin-left: 1px;
    }
    .typewriter-cursor.cursor-fade {
      animation: blink 0.75s step-end 4 forwards;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* Project card hover — name pop-out */
    .project-card-hover {
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1),
                  box-shadow 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .project-card-hover:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 32px rgba(14, 36, 24, 0.08);
    }
    .project-card-hover:hover .project-title {
      transform: translateY(-2px);
      text-shadow: 0 1px 0 rgba(15, 163, 107, 0.15);
      color: var(--accent);
    }
    .project-title {
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1),
                  color 0.2s ease,
                  text-shadow 0.3s ease;
      display: inline-block;
    }

    /* Workflow step stagger — plays on mount */
    .workflow-step {
      animation: workflowFadeUp 0.5s ease forwards;
      opacity: 0;
    }
    @keyframes workflowFadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Human Review subtle pulse */
    .human-review-pulse {
      animation: human-pulse 4s ease-in-out infinite;
    }
    @keyframes human-pulse {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(15, 163, 107, 0.06);
      }
      50% {
        box-shadow: 0 0 0 6px rgba(15, 163, 107, 0.03);
      }
    }

    /* Cascade reveal */
    .cascade-line {
      opacity: 0;
      transform: translateY(6px);
    }
    .cascade-line.revealed {
      animation: cascadeFade 0.5s ease forwards;
    }
    @keyframes cascadeFade {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Agent card hover */
    .agent-card {
      transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1),
                  box-shadow 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .agent-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(14, 36, 24, 0.06);
    }

    /* Table row hover */
    .model-table-row {
      transition: background-color 0.2s ease;
    }
    .model-table-row:hover {
      background-color: rgba(15, 163, 107, 0.04);
    }

    /* GitHub link arrow slide */
    .github-link-arrow {
      transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .github-link:hover .github-link-arrow {
      transform: translateX(3px);
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
      .animate-reveal,
      .animate-reveal.visible {
        animation: none !important;
        opacity: 1 !important;
      }
      .react-grid-item {
        transition: none !important;
      }
      .typewriter-cursor {
        animation: none !important;
        opacity: 1 !important;
      }
      .workflow-step {
        animation: none !important;
        opacity: 1 !important;
        transform: none !important;
      }
      .human-review-pulse {
        animation: none !important;
      }
    }

    .react-grid-layout { position: relative; transition: height 200ms ease; }
    .react-grid-item { transition: all 200ms ease; transition-property: left, top; }
    .react-grid-item.cssTransforms { transition-property: transform; }
    .react-grid-item.resizing { z-index: 1000; will-change: width, height; }
    .react-grid-item.react-draggable-dragging { transition: none !important; z-index: 3000 !important; }
    .react-grid-item.dropping { visibility: hidden; }

    .react-grid-placeholder {
      background: rgba(15, 163, 107, 0.04) !important;
      border: 1.5px dashed rgba(15, 163, 107, 0.12) !important;
      border-radius: 24px !important;
      opacity: 1 !important;
      z-index: 5 !important;
      transition: all 450ms cubic-bezier(0.16, 1, 0.3, 1) !important;
    }

    .react-grid-item {
      transition: transform 450ms cubic-bezier(0.16, 1, 0.3, 1),
        width 450ms cubic-bezier(0.16, 1, 0.3, 1),
        height 450ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    .layout-initializing .react-grid-item { transition: none !important; }
    .react-resizable-handle { display: none !important; }
  </style>

<body class="font-sans">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
  <script>
    (function () {
      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(e) { if (e.isIntersecting) e.target.classList.add('visible'); });
      }, { threshold: 0.15 });
      setTimeout(function() {
        document.querySelectorAll('.animate-reveal, .react-grid-item').forEach(function(el) { observer.observe(el); });
      }, 200);
    })();
  </script>
</body>
