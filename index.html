  <style>
    :root {
      --bg: #F7F5EF;
      --card-cream: #FDFCF9;
      --card-mint: #F2F8F4;
      --text: #0E2418;
      --muted: #5A6B61;
      --accent: #0FA36B;
      --accent-soft: rgba(15, 163, 107, 0.08);
      --border: rgba(14, 36, 24, 0.06);
      --border-hover: rgba(14, 36, 24, 0.12);
      --shadow: 0 2px 12px rgba(14, 36, 24, 0.03);
      --shadow-hover: 0 4px 24px rgba(14, 36, 24, 0.05);
    }

    body {
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    h1, h2, h3, h4, .font-display {
      font-family: 'Manrope', system-ui, sans-serif;
    }

    .font-serif {
      font-family: 'Instrument Serif', Georgia, serif;
    }

    .glass {
      background: var(--card-cream);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      transition: box-shadow 0.3s ease, border-color 0.3s ease;
    }

    .glass:hover {
      border-color: var(--border-hover);
      box-shadow: var(--shadow-hover);
    }

    .glass-mint {
      background: var(--card-mint);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      transition: box-shadow 0.3s ease, border-color 0.3s ease;
    }

    .glass-mint:hover {
      border-color: rgba(15, 163, 107, 0.15);
      box-shadow: var(--shadow-hover);
    }

    .scroll-container {
      mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
      -webkit-mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(14, 36, 24, 0.12); border-radius: 10px; }

    /* Custom cursor */
    .custom-cursor { width: 24px; height: 24px; border: 2px solid rgba(15, 163, 107, 0.4); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; transition: width 0.2s, height 0.2s, border-color 0.2s, transform 0.1s; transform: translate(-50%, -50%); }
    .custom-cursor.hover { width: 40px; height: 40px; border-color: rgba(15, 163, 107, 0.6); }
    @media (max-width: 768px), (pointer: coarse) { .custom-cursor { display: none; } }

    /* Scroll reveal */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-reveal { opacity: 0; }
    .animate-reveal.visible { animation: fadeUp 0.6s ease forwards; }

    .react-grid-layout { position: relative; transition: height 200ms ease; }
    .react-grid-item { transition: all 200ms ease; transition-property: left, top; }
    .react-grid-item.cssTransforms { transition-property: transform; }
    .react-grid-item.resizing { z-index: 1000; will-change: width, height; }
    .react-grid-item.react-draggable-dragging { transition: none !important; z-index: 3000 !important; }
    .react-grid-item.dropping { visibility: hidden; }

    .react-grid-placeholder {
      background: rgba(15, 163, 107, 0.04) !important;
      border: 1.5px dashed rgba(15, 163, 107, 0.12) !important;
      border-radius: 24px !important;
      opacity: 1 !important;
      z-index: 5 !important;
      transition: all 450ms cubic-bezier(0.16, 1, 0.3, 1) !important;
    }

    .react-grid-item {
      transition: transform 450ms cubic-bezier(0.16, 1, 0.3, 1),
        width 450ms cubic-bezier(0.16, 1, 0.3, 1),
        height 450ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    .layout-initializing .react-grid-item { transition: none !important; }
    .react-resizable-handle { display: none !important; }
  </style>

<body class="font-sans">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
  <script>
    (function () {
      if (window.matchMedia('(max-width: 768px)').matches || window.matchMedia('(pointer: coarse)').matches) return;
      var c = document.createElement('div'); c.className = 'custom-cursor'; document.body.appendChild(c);
      document.addEventListener('mousemove', function(e) { c.style.left = e.clientX + 'px'; c.style.top = e.clientY + 'px'; });
      document.addEventListener('mouseover', function(e) { var t = e.target; if (t.closest('a, button, .cursor-hover')) c.classList.add('hover'); else c.classList.remove('hover'); });
      document.addEventListener('mouseout', function() { c.classList.remove('hover'); });
    })();
  </script>
  <script>
    (function () {
      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(e) { if (e.isIntersecting) e.target.classList.add('visible'); });
      }, { threshold: 0.15 });
      setTimeout(function() {
        document.querySelectorAll('.animate-reveal, .react-grid-item').forEach(function(el) { observer.observe(el); });
      }, 200);
    })();
  </script>
</body>
